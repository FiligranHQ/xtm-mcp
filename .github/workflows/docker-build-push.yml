---

name: Build and publish Docker image for XTM MCP

on:
  push:
    tags:
    - '*'

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build'
        type: string
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Extract tag
      id: extract_tag
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        ref="${GITHUB_REF#refs/tags/}"
        if [[ "$ref" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
          echo "TAG=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
          echo "Version ${BASH_REMATCH[1]}"
        else
          echo "Invalid tag '$ref'. Expected format: vX.Y.Z" >&2
          exit 1
        fi

    - name: Use workflow_dispatch input as tag
      if: github.event_name == 'workflow_dispatch'
      run: |
        if [ -z "${{ github.event.inputs.image_tag }}" ]; then
          echo "No image_tag input provided." >&2
          exit 1
        fi
        echo "TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_ENV"
        echo "Using input tag ${{ github.event.inputs.image_tag }}"

    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile 
        push: true
        tags: |
          filigran/xtm-mcp:${{ env.TAG }}
        no-cache: true